name: Simple Test

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check node version
        run: node --version

      - name: Check npm version
        run: npm --version

      - name: List files
        run: ls -la

      - name: Check package.json
        run: cat package.json

      - name: Install dependencies
        run: npm install

      - name: Check installed packages
        run: ls -la node_modules/

      - name: List available npm scripts
        run: npm run

      - name: Try build application with detailed logging
        run: npm run build 2>&1 || echo "Build failed"

      - name: Check if out dir was created
        run: ls -la || true
