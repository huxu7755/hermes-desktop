name: Test Electron Builder

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: ls -la out/
      - run: npx electron-builder --linux AppImage --publish never
      - run: ls -la dist/
      - run: find dist/ -type f
